labels:
  - pairs:
      app: mes
      app.kubernetes.io/name: mes
    includeSelectors: true
    includeTemplates: true

resources:
  - deployment.yaml
  - hpa.yaml
  - virtualservice.yaml
  - pdb.yaml
  - service.yaml

configMapGenerator:
  - name: mes-appsettings
    envs:
      - appsettings.env

generatorOptions:
  disableNameSuffixHash: true