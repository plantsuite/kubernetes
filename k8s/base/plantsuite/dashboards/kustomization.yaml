namespace: plantsuite

labels:
  - pairs:
      app: dashboards
      app.kubernetes.io/name: dashboards
    includeSelectors: true
    includeTemplates: true

resources:
  - deployment.yaml
  - hpa.yaml
  - virtualservice.yaml
  - pdb.yaml
  - service.yaml

configMapGenerator:
  - name: dashboards-appsettings
    files:
      - appsettings.json

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: plantsuite.azurecr.io/plantsuite-dashboards
    newTag: 0.28.0