namespace: plantsuite

labels:
  - pairs:
      app: gateway
      app.kubernetes.io/name: gateway
    includeSelectors: true
    includeTemplates: true

resources:
  - deployment.yaml
  - httproute.yaml
  - pdb.yaml
  - service.yaml

configMapGenerator:
  - name: gateway-appsettings
    files:
      - appsettings.json
      - appsettings-ui.json

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: plantsuite.azurecr.io/plantsuite-gateway
    newTag: 1.1.7
  - name: plantsuite.azurecr.io/plantsuite-gateway-ui
    newTag: 1.1.7
