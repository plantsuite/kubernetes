namespace: plantsuite

labels:
  - pairs:
      app: mes
      app.kubernetes.io/name: mes
    includeSelectors: true
    includeTemplates: true

resources:
  - deployment.yaml
  - hpa.yaml
  - virtualservice.yaml
  - pdb.yaml
  - service.yaml

secretGenerator:
  - name: plantsuite-mes-env
    files:
      - appsettings.env

configMapGenerator:
  - name: mes-appsettings
    files:
      - appsettings.json

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: plantsuite.azurecr.io/plantsuite-mes
    newTag: 2.0.0