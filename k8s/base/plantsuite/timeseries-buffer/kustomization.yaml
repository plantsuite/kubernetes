namespace: plantsuite

labels:
  - pairs:
      app: timeseries-buffer
      app.kubernetes.io/name: timeseries-buffer
    includeSelectors: true
    includeTemplates: true

resources:
  - hpa.yaml
  - pdb.yaml
  - service.yaml
  - statefulset.yaml

configMapGenerator:
  - name: timeseries-buffer-appsettings
    files:
      - appsettings.json

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: plantsuite.azurecr.io/plantsuite-timeseries
    newTag: 0.16.0
