namespace: plantsuite

labels:
  - pairs:
      app: wd
      app.kubernetes.io/name: wd
    includeSelectors: true
    includeTemplates: true

resources:
  - deployment.yaml
  - hpa.yaml
  - virtualservice.yaml
  - pdb.yaml
  - service.yaml

configMapGenerator:
  - name: wd-appsettings
    files:
      - appsettings.json
      - appsettings-ui.json

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: plantsuite.azurecr.io/plantsuite-wd
    newTag: 2.1.0-alpha.2
  - name: plantsuite.azurecr.io/plantsuite-wd-ui
    newTag: 2.1.0-alpha.2
