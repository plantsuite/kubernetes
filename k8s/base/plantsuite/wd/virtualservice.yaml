apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: wd
spec:
  hosts:
    - wd.plantsuite.local
  gateways:
    - istio-ingress/gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: wd
            port:
              number: 80
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: wd-ui
spec:
  hosts:
    - wd-ui.plantsuite.local
  gateways:
    - istio-ingress/gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: wd
            port:
              number: 8080
