protected-mode no
cluster-enabled yes
cluster-config-file nodes.conf
# Detecção rápida de falhas em rolling restarts do K8s
cluster-node-timeout 5000
cluster-allow-reads-when-down yes
cluster-require-full-coverage no
cluster-announce-port 6379
cluster-announce-bus-port 16379
cluster-preferred-endpoint-type hostname
port 6379
cluster-port 16379
appendonly yes
appendfsync everysec
replica-read-only yes
bind 0.0.0.0
# Dados armazenados no volume persistente
dir /data
# Desabilita snapshots RDB — AOF (appendonly yes) é suficiente para durabilidade
# RDB snapshots geram I/O desnecessária em ambientes com AOF ativo
save ""
# Permite migração de replica para masters sem replica
cluster-migration-barrier 1
# Evita que replicas stale promovam com dados desatualizados
cluster-replica-validity-factor 10
# Nível de log estruturado
loglevel notice
# Observabilidade de performance
slowlog-log-slower-than 10000
slowlog-max-len 128
# Connection guard
maxclients 10000