apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
spec:
  serviceName: redis-nodes
  replicas: 6
  template:
    spec:
      serviceAccountName: redis
      # Allow up to 60 s for masters to transfer leadership before termination
      terminationGracePeriodSeconds: 60
      initContainers:
        # Garante que /data seja propriedade do usuário redis (UID 1000) antes de redis-server iniciar.
        # Executa como root; isolado aqui para evitar dar acesso root ao container redis.
        - name: fix-data-permissions
          image: busybox:1.37.0
          command: ["sh", "-c", "chown -R 1000:1000 /data"]
          # Inicializa permissões de /data como root antes de redis-server iniciar
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 32Mi
        - name: get-replicas
          image: alpine/kubectl:1.34.1
          command: ["sh", "-c"]
          args:
            - |
                SERVICENAME=$(echo ${HOSTNAME} | rev | cut -d'-' -f2- | rev)
                NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
                REPLICAS=$(kubectl get statefulset ${SERVICENAME} -n ${NAMESPACE} -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "6")
                echo "REPLICAS=${REPLICAS}" > /shared/replicas.env
                echo "Detected ${REPLICAS} replicas from StatefulSet"
                # Disponibiliza kubectl para o sidecar redis-healer (imagem redis:alpine não tem kubectl)
                cp "$(which kubectl)" /shared/kubectl && chmod +x /shared/kubectl
                echo "kubectl copiado para /shared/kubectl"
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: shared
              mountPath: /shared
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 100m
              memory: 128Mi
        - name: init-config
          image: busybox:1.37.0
          command: ["sh", "-c"]
          args:
            - |
              # Source the replicas count from shared volume
              . /shared/replicas.env 2>/dev/null || REPLICAS=6
              export REPLICAS
              sh /scripts/init-config.sh
          volumeMounts:
            - name: shared
              mountPath: /shared
            - name: config
              mountPath: /etc/redis
              readOnly: true
            - name: scripts
              mountPath: /scripts
            - name: workdir
              mountPath: /config
            - name: data
              mountPath: /data
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-env
                  key: password
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MEMORY_LIMIT
              valueFrom:
                resourceFieldRef:
                  containerName: redis
                  resource: limits.memory
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 100m
              memory: 128Mi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - redis
      containers:
        - name: redis
          image: redis:8.6.0
          ports:
            - name: client
              containerPort: 6379
            - name: cluster
              containerPort: 16379
          volumeMounts:
            - name: shared
              mountPath: /shared
            - name: data
              mountPath: /data
            - name: workdir
              mountPath: /etc/redis
            - name: scripts
              mountPath: /scripts
          command: ["sh", "-c"]
          args:
            - |
              # Carrega contagem de replicas do volume compartilhado
              . /shared/replicas.env 2>/dev/null || REPLICAS=6
              export REPLICAS
              # redis-server executa em background; init-cluster.sh controla foreground.
              # Saída não-zero de init-cluster.sh mata redis-server → pod reinicia.
              redis-server /etc/redis/redis.conf &
              REDIS_PID=$!
              sh /scripts/init-cluster.sh
              INIT_RC=$?
              if [ "${INIT_RC}" -ne 0 ]; then
                kill "${REDIS_PID}" 2>/dev/null
                exit "${INIT_RC}"
              fi
              wait "${REDIS_PID}"
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: REDISCLI_AUTH
              valueFrom:
                secretKeyRef:
                  name: redis-env
                  key: password
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 100m
              memory: 256Mi
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          lifecycle:
            preStop:
              exec:
                # Aguarda antes de encerrar para drenagem de conexões.
                # Masters aguardam mais tempo para promoção via init-cluster.sh.
                command:
                  - /bin/sh
                  - -c
                  - |
                    ROLE=$(redis-cli info replication 2>/dev/null | grep ^role: | tr -d '\r' | cut -d: -f2)
                    if [ "${ROLE}" = "master" ]; then sleep 10; else sleep 5; fi
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  # Liveness deve ser conservadora: apenas verifica se o processo responde.
                  # Estados transitórios como AOF rewrite nao devem provocar restart do pod.
                  redis-cli ping | grep -q PONG
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  # Readiness probe dinâmica — detecta REPLICAS de /shared/replicas.env (fonte de verdade)
                  # Suporta scaling events: quando StatefulSet muda de replicas, o probe se adapta automaticamente
                  . /shared/replicas.env 2>/dev/null || REPLICAS=6
                  
                  if [ "${REPLICAS}" -eq "1" ]; then
                    # Modo standalone (REPLICAS=1): apenas verifica conectividade básica
                    # Evita falhas ao tentar comandos de cluster que não estão disponíveis
                    redis-cli ping | grep -q PONG
                  else
                    # Modo cluster (REPLICAS>1): valida estado completo do cluster
                    # Verifica: cluster operacional, pod é membro (master/slave), e mínimo 2 masters
                    redis-cli cluster info | grep -q 'cluster_state:ok' && \
                    redis-cli cluster nodes | grep -q 'myself.*master\|myself.*slave' && \
                    MASTERS=$(redis-cli cluster info | grep -oP 'cluster_size:\K[0-9]+' 2>/dev/null || echo 3); \
                    [ "${MASTERS:-0}" -ge 2 ]
                  fi
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6
            successThreshold: 1
        # # Exporta métricas Prometheus
        # # Detecta automaticamente modo cluster
        # - name: redis-exporter
        #   image: oliver006/redis_exporter:latest
        #   securityContext:
        #     runAsUser: 59000
        #     runAsGroup: 59000
        #     allowPrivilegeEscalation: false
        #     capabilities:
        #       drop:
        #         - ALL
        #   resources:
        #     requests:
        #       cpu: 100m
        #       memory: 100Mi
        #   ports:
        #     - containerPort: 9121
        #       name: metrics
        #   env:
        #     - name: REDIS_ADDR
        #       value: redis://localhost:6379
        #     - name: REDIS_EXPORTER_IS_CLUSTER
        #       value: "true"
        # Sidecar de auto-reparo conservativo com eleição de líder via Lease K8s.
        # Executa apenas operações seguras e idempotentes: CLUSTER FORGET (stale),
        # CLUSTER REPLICATE (replicação quebrada), CLUSTER MEET (peers faltando).
        # Nunca executa: CLUSTER RESET, add-node, del-node, reshard.
        - name: redis-healer
          # Mesma imagem do container principal: contém redis-cli sem precisar instalar nada.
          # redis-server não é invocado — apenas redis-cli e kubectl (via script).
          image: redis:8.6.0-alpine
          command: ["/bin/sh", "/scripts/redis-healer.sh"]
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REDISCLI_AUTH
              valueFrom:
                secretKeyRef:
                  name: redis-env
                  key: password
          volumeMounts:
            - name: shared
              mountPath: /shared
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          securityContext:
            runAsUser: 65534
            runAsNonRoot: true
            readOnlyRootFilesystem: false
      volumes:
        - name: shared
          emptyDir: {}
        - name: config
          configMap:
            name: redis
        - name: scripts
          configMap:
            name: redis
            items:
              - key: init-cluster.sh
                path: init-cluster.sh
              - key: init-config.sh
                path: init-config.sh
              - key: redis-healer.sh
                path: redis-healer.sh
            defaultMode: 0755
        - name: workdir
          emptyDir: {}
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
